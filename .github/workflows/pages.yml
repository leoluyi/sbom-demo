name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'sbom-outputs/html/**'
      - '_config.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site source
        run: |
          mkdir -p _site_src/docs _site_src/sbom-reports

          # README as index (add front matter for Jekyll theme layout)
          { echo '---'; echo 'layout: default'; echo '---'; echo; cat README.md; } > _site_src/index.md

          # docs (add front matter, extract title from first heading)
          for f in docs/*.md; do
            title=$(head -1 "$f" | sed 's/^#\+ *//')
            { echo '---'; echo "title: \"${title}\""; echo '---'; echo; cat "$f"; } > "_site_src/$f"
          done

          # SBOM HTML reports (static, served as-is)
          cp -r sbom-outputs/html/* _site_src/sbom-reports/

          # Jekyll config
          cp _config.yml _site_src/

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: _site_src

      - uses: actions/upload-pages-artifact@v3

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
